name: Mutation
on: [push, pull_request]
jobs:
  infection:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: infection
          coverage: pcov

      - name: Install dependencies
        uses: ramsey/composer-install@v4

      - name: Run Infection
        run: infection --threads=max --no-progress --logger-github
